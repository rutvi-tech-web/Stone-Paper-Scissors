<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stone Paper Scissor</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

h1 {
    color: #ff4d6d;
}

.score {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 20px;
}

.box {
    background: #222;
    padding: 10px 20px;
    border-radius: 10px;
}

button {
    font-size: 40px;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

#result {
    margin-top: 20px;
    font-size: 22px;
}
</style>
</head>

<body>

<h1>🎮 Stone Paper Scissor</h1>

<div class="score">
    <div class="box">You: <span id="userScore">0</span></div>
    <div class="box">CPU: <span id="cpuScore">0</span></div>
    <div class="box">Draw: <span id="drawScore">0</span></div>
</div>

<button onclick="play('stone')">🪨</button>
<button onclick="play('paper')">📄</button>
<button onclick="play('scissor')">✂️</button>

<h2 id="result">Start Game</h2>

<br>
<button onclick="resetGame()">🔄 Reset</button>

<script>
let userScore = 0;
let cpuScore = 0;
let drawScore = 0;

function play(choice) {
    fetch('/play', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ choice })
    })
    .then(res => res.json())
    .then(data => {

        if (data.result === "win") {
            userScore++;
            document.getElementById("result").innerText = "🎉 You Win!";
        } 
        else if (data.result === "lose") {
            cpuScore++;
            document.getElementById("result").innerText = "😢 You Lose!";
        } 
        else {
            drawScore++;
            document.getElementById("result").innerText = "🤝 Draw!";
        }

        document.getElementById("userScore").innerText = userScore;
        document.getElementById("cpuScore").innerText = cpuScore;
        document.getElementById("drawScore").innerText = drawScore;
    })
    .catch(err => console.log(err));
}

function resetGame() {
    userScore = 0;
    cpuScore = 0;
    drawScore = 0;

    document.getElementById("userScore").innerText = 0;
    document.getElementById("cpuScore").innerText = 0;
    document.getElementById("drawScore").innerText = 0;

    document.getElementById("result").innerText = "Start Game";
}
</script>

</body>
</html>
